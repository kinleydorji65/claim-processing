# Server Port
server:
  # address: 192.168.123.29
  port: 8085

# Database
spring:
  application:
    name: claim-processing
  datasource:
    url: jdbc:oracle:thin:@//10.15.15.20:1521/NPPFDB
    username: premia_nppf
    password: PremiaNPPF2025
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
        connection-init-sql: ALTER SESSION SET NLS_DATE_FORMAT='YYYY-MM-DD HH24:MI:SS'
        maximum-pool-size: 10
        minimum-idle: 2
        connection-timeout: 30000
  jackson:
    time-zone: Asia/Thimphu
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        show_sql: true
        format_sql: true
        jdbc:
          batch_size: 20
          order_inserts: true
          order_updates: true
          time_zone: Asia/Thimphu

  # Redis Session
  session:
    store-type: redis
  data:
    redis:
      host: 10.15.15.20
      port: 6379
      password: Ruf0us@324#
      timeout: 5000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 5000ms
        shutdown-timeout: 2000ms

# Images and Videos
app:
  resources:
    images:
      path: /images
    videos:
      path: /videos
  
    

# Logging
# logging:
#   level:
#     root: INFO
#     org.springframework: INFO
#     nppf.org.bt: DEBUG

logging:
  # Keep only these:
  file:
    name: logs/application.log
  level:
    nppf.org.bt.claim-processing: DEBUG

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: "*"
      base-path: /actuator
  endpoint:
    health:
      show-details: always
    redis:
      enabled: true
    session:
      enabled: true

# Swagger Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    
